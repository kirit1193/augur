name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov=nuncio --cov-report=xml --cov-report=term -q

      - name: Summarize coverage
        if: matrix.python-version == '3.14'
        run: |
          python - <<'EOF'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.attrib["line-rate"])
          pct = round(line_rate * 100)

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as f:
              f.write(f"Coverage: {pct}%\n")
          EOF

      - name: Upload coverage report
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  coverage-badge:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: badges
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: coverage-xml

      - name: Compute badge color and message
        id: badge
        run: |
          python - <<'EOF'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.attrib["line-rate"])
          pct = round(line_rate * 100)

          if pct < 70:
              color = "red"
          elif pct < 80:
              color = "orange"
          elif pct < 85:
              color = "yellow"
          elif pct < 90:
              color = "green"
          else:
              color = "brightgreen"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"pct={pct}\n")
              f.write(f"color={color}\n")
          EOF

      - name: Write badge JSON
        run: |
          cat > coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${{ steps.badge.outputs.pct }}%","color":"${{ steps.badge.outputs.color }}"}
          EOF

      - name: Publish to the badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/badges-worktree

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch origin badges
            git worktree add /tmp/badges-worktree origin/badges
            cd /tmp/badges-worktree
            git switch -c badges
          else
            git worktree add --detach /tmp/badges-worktree
            cd /tmp/badges-worktree
            git switch --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "${GITHUB_WORKSPACE}/coverage.json" ./coverage.json
          git add coverage.json
          git commit -m "update coverage badge" --allow-empty
          git push origin badges --force
